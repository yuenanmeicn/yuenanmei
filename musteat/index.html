        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length); // Remove leading spaces
                if (c.indexOf(nameEQ) === 0) {
                    return c.substring(nameEQ.length, c.length);
                }
            }
            return null;
        }

        let defaultLang = 'zh-CN';
        let currentLang = null;
        try {   
            if(getCookie('lang') !== null){
                currentLang = getCookie('lang');
            } else {
                currentLang = defaultLang;
            }
            setCookie('lang', currentLang, 7);
        } catch(error){
            setCookie('lang', defaultLang, 7);
        }
        
        function getValue(obj, path) {
            const keys = path.split('.');
            let result = obj;
            for (let i = 0; i < keys.length; i++) {
                if (result && result[keys[i]]) {
                    result = result[keys[i]];
                } else {
                    return undefined;
                }
            }
            return result;
        }
        function updatePage() {
            const lang = translations[currentLang];
            if (!lang) return;
            document.title = getValue(lang, 'musteat.pageTitle') || lang.title;
            document.documentElement.lang = currentLang;
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                const key = el.getAttribute('data-i18n');
                const value = getValue(lang, key);
                if (value !== undefined) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.value = value;
                    } else {
                        el.innerHTML = value.replace(/\n/g, '<br>');
                    }
                }
            });
            document.querySelectorAll('[data-i18n-href]').forEach(function(el) {
                const key = el.getAttribute('data-i18n-href');
                const value = getValue(lang, key);
                if (value !== undefined) {
                    const href = el.getAttribute('href');
                    const newHref = href.split('?text=')[0] + '?text=' + encodeURIComponent(value);
                    el.setAttribute('href', newHref);
                }
            });
            const btn = document.getElementById('langToggle');
            if (btn) {
                btn.textContent = currentLang === 'zh-HK' ? '繁' : '简';
            }
        }
        function toggleLang() {
            currentLang = currentLang === 'zh-HK' ? 'zh-CN' : 'zh-HK';
            setCookie('lang', currentLang, 7);
            updatePage();
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updatePage);
        } else {
            updatePage();
        }
        document.querySelector('.menu') && document.querySelector('.menu').addEventListener('click', function() {
            const nav = document.querySelector('nav ul');
            if (nav) nav.classList.toggle('show');
        });
